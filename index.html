<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Student Dashboard</title>
        <link rel="stylesheet" href="style.css">
    </head>
        <body>
            <h1>Student Dashboard</h1> <!-- Titre de la page -->
            <section>
                <h2>Add student</h2>
                <input type="text" id="studentName" placeholder="Nom de l'étudiant"> <!-- Champ de saisie pour le nom de l'étudiant -->
                <button>Add</button> <!-- Bouton pour ajouter l'étudiant -->
                <select id="studentSelect"></select> <!-- Liste déroulante pour sélectionner un étudiant -->
                <input type="number" id="noteInput" placeholder="Note"> <!-- Champ de saisie pour la note de l'étudiant -->
                <button>Save Note</button> <!-- Bouton pour enregistrer la note de l'étudiant -->
                <input type="text" id="search" placeholder="Rechercher..."> <!-- Champ de saisie pour la recherche d'étudiants -->

                <!-- Tableau de notes -->
                <table>
                    <thead>
                        <tr>
                            <th>Name</th> <!-- En-tête de colonne pour le nom de l'étudiant -->    
                            <th>Notes</th> <!-- En-tête de colonne pour les notes de l'étudiant -->
                            <th>Average</th> <!-- En-tête de colonne pour la moyenne des notes de l'étudiant -->
                        </tr> 
                    </thead>
                </table>


            </section>
        </body>
</html>
