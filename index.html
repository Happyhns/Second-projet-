    <!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Student Dashboard</title>
        <link rel="stylesheet" href="style.css">
    </head>
        <body>
            <h1>Student Dashboard</h1> <!-- Titre de la page -->
            <section>
                <h2>Add student</h2>
                <input type="text" id="studentName" placeholder="Nom de l'étudiant"> <!-- Champ de saisie pour le nom de l'étudiant -->
                <button id="addStudentBtn">Add</button> <!-- Bouton pour ajouter l'étudiant -->
                <select id="studentSelect"></select> <!-- Liste déroulante pour sélectionner un étudiant -->
                <input type="number" id="noteInput" placeholder="Note"> <!-- Champ de saisie pour la note de l'étudiant -->
                <button id="saveNoteBtn">Save Note</button> <!-- Bouton pour enregistrer la note de l'étudiant -->
                <input type="text" id="search" placeholder="Rechercher..."> <!-- Champ de saisie pour la recherche d'étudiants -->

                <!-- Meilleur étudiant -->
                <h2>Best Student</h2>
                <p id="bestStudent">No students added yet.</p> <!-- Paragraphe pour afficher le meilleur étudiant -->

                <!-- Tableau de notes -->
                <table>
                    <thead>
                        <tr>
                            <th>Name</th> <!-- En-tête de colonne pour le nom de l'étudiant -->    
                            <th>Notes</th> <!-- En-tête de colonne pour les notes de l'étudiant -->
                            <th>Average</th> <!-- En-tête de colonne pour la moyenne des notes de l'étudiant -->
                        </tr>
                    </thead> 
                        <!-- Corps du tableau rempli dynamiquement avec JS -->
                        <tbody id="tableBody">
                            <!-- Les lignes seront ajoutées ici -->
                        </tbody>
                </table>

                <!-- JavaScript -->
                <script src="script.js"></script> <!-- Lien vers le fichier JavaScript pour la logique de l'application -->
                <script src="functions.js"></script> <!-- Lien vers le fichier JavaScript pour les fonctions utilitaires -->
                <script src="arrays.js"></script> <!-- Lien vers le fichier JavaScript pour la fonctionnalité de recherche -->
            </section>
        </body>
</html>
